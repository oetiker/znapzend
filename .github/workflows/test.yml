name: Run Tests

on:
  push:
    branches:
    - master
    tags-ignore:
    - "*"
  pull_request:
  workflow_dispatch:
    # Allow manually running the action, e.g. if disabled after some quietness in the source

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl:
        - "5.32"
        - "5.30"
        - "5.26"
        - "5.36"
#        - "5.22"
#        - "5.18"
#        - "5.10"
    name: Perl ${{ matrix.perl }}
    steps:
    - uses: actions/checkout@v3
    - name: Setup perl
      uses: shogo82148/actions-setup-perl@v1
      with:
        perl-version: ${{ matrix.perl }}
    - run: ./bootstrap.sh
    - run: ./configure --prefix="$HOME/znapzend"
    - run: make test-deps
    - run: ./test.sh
    - run: make install
    - run: "echo \"repo_token: ${{ secrets.GITHUB_TOKEN }}\" > .coveralls.yml"
    - run: perl -I./thirdparty/lib/perl5 thirdparty/bin/cover -report coveralls

  changes-file:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: CHANGES updated
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Ensure CHANGES was updated
      run: |
        git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
        if git diff --quiet "origin/${{ github.event.pull_request.base.ref }}" -- CHANGES; then
          echo "::error::This PR does not update CHANGES. Add a bullet point describing your change under the topmost UNRELEASED entry (see the instructions at the top of the CHANGES file)."
          exit 1
        fi
