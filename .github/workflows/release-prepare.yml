name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - bugfix
          - feature
          - major

jobs:
  release:
    name: Bump, tag and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Verify master branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/master" ]; then
            echo "::error::Releases must be run from the master branch"
            exit 1
          fi

      - name: Calculate new version
        id: version
        run: |
          CURRENT=$(cat VERSION)
          IFS=. read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.release_type }}" in
            major)
              NEW_VERSION="$((MAJOR+1)).0.0"
              ;;
            feature)
              NEW_VERSION="${MAJOR}.$((MINOR+1)).0"
              ;;
            bugfix)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))"
              ;;
          esac

          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${CURRENT} -> ${NEW_VERSION} (${{ inputs.release_type }})"

      - name: Check for an UNRELEASED entry in CHANGES
        run: |
          if ! grep -q '^znapzend (.*) UNRELEASED; urgency=' CHANGES; then
            echo "::error::CHANGES has no UNRELEASED entry at the top -- nothing to release"
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update VERSION and finalize CHANGES
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "${NEW_VERSION}" > VERSION

          export NEW_DATE=$(date -R)
          perl -0777 -i -pe '
            s/^(znapzend \()[^)]+(\) )UNRELEASED(; urgency=\S+)$/$1.$ENV{NEW_VERSION}.$2."unstable".$3/me;
            s/^( -- [^<]+<[^>]+>  ).*$/$1.$ENV{NEW_DATE}/me;
          ' CHANGES

          awk '
            /^znapzend \(/ && !found { found=1; next }
            found && /^ -- / { exit }
            found { print }
          ' CHANGES > release-notes.md
          echo "Release notes:"
          cat release-notes.md

          git add VERSION CHANGES
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git push origin master

      - name: Build source distribution
        run: |
          ./bootstrap.sh
          ./configure
          make dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "ZnapZend ${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md \
            "znapzend-${{ steps.version.outputs.version }}.tar.gz"

      - name: Reopen CHANGES for development
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          IFS=. read -r MAJOR MINOR PATCH <<< "$NEW_VERSION"
          NEXT_DEV_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))"
          NEXT_DATE=$(date -R)
          WHO="github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          awk -v ver="$NEXT_DEV_VERSION" -v who="$WHO" -v dt="$NEXT_DATE" '
            !inserted && /^znapzend \(/ {
              print "znapzend (" ver ") UNRELEASED; urgency=medium"
              print ""
              print ""
              print " -- " who "  " dt
              print ""
              inserted=1
            }
            { print }
          ' CHANGES > CHANGES.new && mv CHANGES.new CHANGES

          echo "${NEXT_DEV_VERSION}" > VERSION

          git add VERSION CHANGES
          git commit -m "Reopen CHANGES for development"
          git push origin master
